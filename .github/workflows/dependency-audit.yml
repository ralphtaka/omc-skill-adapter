name: Dependency Audit

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "17 4 * * 1" # Mondays 04:17 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install (lockfile)
        run: npm ci

      - name: Audit (high+)
        run: npm audit --audit-level=high

